## Goal

Create a bidirectional bridge between Bernstein's scenario library and Claude Code
Routines. Direction A: Export Bernstein scenarios as ready-to-use Routine prompts
with the correct MCP setup so teams can provision Routines that automatically
invoke Bernstein orchestration. Direction B: Allow Routines to discover and invoke
Bernstein scenarios by name via MCP tools, selecting from the scenario library
like a menu.

This is the enterprise-grade "self-service automation" layer — team leads define
scenarios once in Bernstein, ops provisions them as Routines, developers trigger
them from GitHub events or schedules without touching Bernstein internals.

## Background

### Bernstein Scenario Library (existing)

`src/bernstein/core/planning/scenario_library.py` — YAML-based reusable orchestration recipes:

```yaml
# scenarios/pr-review-comprehensive.yaml
scenario_id: pr-review-comprehensive
name: Comprehensive PR Review
description: Multi-role parallel review with security, performance, and style checks
tags: [review, ci, quality]
tasks:
  - title: Security review
    role: security
    priority: 0
    scope: medium
    complexity: moderate
  - title: Performance review
    role: backend
    priority: 1
    scope: medium
    complexity: moderate
  - title: Style and standards review
    role: reviewer
    priority: 1
    scope: small
    complexity: simple
  - title: Test coverage analysis
    role: qa
    priority: 2
    scope: small
    complexity: simple
```

### Bernstein Workflow DSL (existing)

`src/bernstein/core/planning/workflow_dsl.py` — DAG of phases with guards:

```yaml
phases:
  - name: plan
    allowed_roles: [architect, manager]
    completion_guard: "all_tasks_done"
  - name: implement
    depends_on: [plan]
    allowed_roles: [backend, frontend]
  - name: verify
    depends_on: [implement]
    allowed_roles: [qa, security]
    approval_required: true
  - name: merge
    depends_on: [verify]
```

### Claude Code Routine Structure

A Routine = prompt + repos + environment + connectors + triggers.
Created via claude.ai/code/routines or `/schedule` CLI.
No programmatic creation API exists yet (research preview).

## Design

### Direction A: Scenario → Routine Export

#### RoutineProvisioner

```python
# src/bernstein/core/planning/routine_provisioner.py

class RoutineProvisioner:
    """Generates Routine prompt+config from Bernstein scenarios.

    Since Routines don't have a programmatic creation API yet,
    this generates:
    1. A markdown prompt optimized for Routine execution
    2. An MCP connector config for Bernstein server
    3. Setup instructions for claude.ai/code/routines
    4. A GitHub trigger recommendation based on scenario tags
    """

    def export_scenario_as_routine(
        self,
        scenario_id: str,
        repo: str,
        bernstein_url: str = "http://127.0.0.1:8052",
    ) -> RoutineExport:
        """Generate everything needed to create a Routine from a scenario."""
        scenario = self.library.get(scenario_id)

        return RoutineExport(
            name=f"Bernstein: {scenario.name}",
            prompt=self._build_routine_prompt(scenario, bernstein_url),
            recommended_triggers=self._recommend_triggers(scenario),
            mcp_config=self._build_mcp_config(bernstein_url),
            environment_vars=self._build_env_vars(scenario),
            setup_instructions=self._build_setup_guide(scenario, repo),
        )

    def _build_routine_prompt(self, scenario: ScenarioRecipe, url: str) -> str:
        """Build the Routine prompt that invokes Bernstein.

        The prompt instructs the Routine session to:
        1. Connect to Bernstein MCP server
        2. Call bernstein_scenario(scenario_id) to start orchestration
        3. Monitor progress via bernstein_status()
        4. Report results via comment/message
        """
        return f"""You are a Bernstein orchestration relay. When triggered:

1. Call the Bernstein MCP tool `bernstein_scenario` with:
   - scenario_id: "{scenario.scenario_id}"
   - Additional context from the trigger event (PR number, commit SHA, etc.)

2. Monitor progress by calling `bernstein_status()` every 30 seconds.

3. When all tasks complete, summarize results:
   - List each task and its outcome (pass/fail)
   - Note any quality gate failures
   - If a GitHub PR triggered this, post a review comment with findings

### Scenario: {scenario.name}
{scenario.description}

### Tasks that will execute:
{self._format_task_list(scenario.tasks)}

### Expected behavior:
- Bernstein decomposes this into {len(scenario.tasks)} parallel tasks
- Each task runs in an isolated git worktree
- Quality gates verify output before merge
- If any task fails, it retries with an escalated model
"""

    def _recommend_triggers(self, scenario: ScenarioRecipe) -> list[TriggerRecommendation]:
        """Suggest appropriate Routine triggers based on scenario tags."""
        recommendations = []

        if "review" in scenario.tags or "ci" in scenario.tags:
            recommendations.append(TriggerRecommendation(
                type="github",
                event="pull_request.opened",
                reason="Review scenarios should run on every new PR",
            ))

        if "maintenance" in scenario.tags or "cleanup" in scenario.tags:
            recommendations.append(TriggerRecommendation(
                type="schedule",
                cadence="daily",
                reason="Maintenance scenarios run best on a nightly schedule",
            ))

        if "deploy" in scenario.tags or "verify" in scenario.tags:
            recommendations.append(TriggerRecommendation(
                type="api",
                reason="Deploy verification should be triggered by CD pipeline",
            ))

        return recommendations
```

#### CLI Commands

```bash
# List available scenarios
bernstein routine scenarios

# Export a scenario as a Routine config
bernstein routine export pr-review-comprehensive \
  --repo chernistry/bernstein \
  --output routine-config/

# Output:
# routine-config/
#   prompt.md          — paste into Routine prompt field
#   mcp-config.json    — add as Routine connector
#   setup-guide.md     — step-by-step instructions
#   triggers.md        — recommended trigger configuration

# Interactive provisioning wizard
bernstein routine provision
# 1. Select scenario
# 2. Configure repo and triggers
# 3. Opens claude.ai/code/routines with pre-filled info
# 4. User completes setup
# 5. User pastes trigger_id back
# 6. Bernstein saves mapping
```

### Direction B: Routine → Scenario Discovery via MCP

#### New MCP Tools

Extend `src/bernstein/mcp/server.py` with scenario-aware tools:

```python
# src/bernstein/mcp/routine_tools.py

@mcp_tool
async def bernstein_scenario(
    scenario_id: str,
    context: str = "",
    pr_number: int | None = None,
    branch: str | None = None,
) -> dict:
    """Invoke a pre-defined Bernstein scenario.

    A scenario is a reusable orchestration recipe that decomposes into
    multiple parallel tasks with roles, priorities, and quality gates.

    Args:
        scenario_id: Name of the scenario (e.g., 'pr-review-comprehensive')
        context: Additional context for task prompts
        pr_number: If triggered by a PR, the PR number for context injection
        branch: Override the target branch (default: repo default)

    Returns:
        Dictionary with orchestration_id, task_count, estimated_duration
    """
    ...

@mcp_tool
async def bernstein_scenarios() -> list[dict]:
    """List all available Bernstein scenarios.

    Returns a list of scenario summaries with id, name, description,
    tags, task_count, and recommended_triggers.
    """
    library = ScenarioLibrary.load()
    return [
        {
            "id": s.scenario_id,
            "name": s.name,
            "description": s.description,
            "tags": s.tags,
            "task_count": len(s.tasks),
            "roles": list(set(t.role for t in s.tasks)),
        }
        for s in library.all()
    ]

@mcp_tool
async def bernstein_scenario_status(orchestration_id: str) -> dict:
    """Get detailed status of a running scenario orchestration.

    Returns per-task status, quality gate results, cost breakdown,
    and estimated time remaining.
    """
    ...
```

This means a Routine can:
1. Call `bernstein_scenarios()` to see what's available
2. Call `bernstein_scenario("pr-review-comprehensive", pr_number=42)` to start
3. Call `bernstein_scenario_status(orch_id)` to monitor
4. Summarize results and post to GitHub/Slack

### Scenario Templates for Common Use Cases

Create 8 ready-to-use scenario templates at `templates/scenarios/`:

```
templates/scenarios/
  pr-review-comprehensive.yaml     — 4-role parallel PR review
  pr-review-security-focused.yaml  — security-first review + SAST
  nightly-maintenance.yaml         — deps update, stale cleanup, lint fix
  deploy-smoke-test.yaml           — post-deploy verification suite
  issue-decomposition.yaml         — break issue into implementation tasks
  docs-sync.yaml                   — detect and fix docs drift
  dependency-audit.yaml            — security audit of dependency tree
  test-coverage-boost.yaml         — find untested code, generate tests
```

Each scenario includes:
- Clear task definitions with roles and priorities
- A matching Routine prompt template
- Recommended triggers
- Expected duration estimate

### Enterprise Self-Service Flow

```
┌─────────────────┐    ┌─────────────────┐    ┌────────────────┐
│  Team Lead       │    │  Bernstein       │    │  Anthropic     │
│  defines         │───→│  exports         │───→│  Routines      │
│  scenario.yaml   │    │  Routine config  │    │  (cloud)       │
└─────────────────┘    └─────────────────┘    └───────┬────────┘
                                                       │
                       ┌─────────────────┐             │ GitHub event
                       │  Bernstein       │◄────────────┘ fires Routine
                       │  orchestrates    │   Routine calls bernstein_scenario()
                       │  multi-agent     │
                       │  parallel work   │
                       └─────────────────┘
```

**Enterprise value**: Scenarios are version-controlled YAML in the repo. Routines
are cloud triggers. The bridge connects them without requiring developers to
understand either system's internals. "Add this scenario, I'll set up the trigger"
becomes a 5-minute ops task.

