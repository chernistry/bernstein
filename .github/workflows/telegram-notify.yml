name: Telegram CI Notifications

# Telegram fan-out for CI completion events. Originally listened to
# `workflow_run: CI completed` directly; now invoked by
# `post-ci-dispatcher.yml` via workflow_call so the dispatcher pays the
# cold start once and routes to every child reusable in a single boot.
#
# The file path stays at .github/workflows/telegram-notify.yml so existing
# branch protection rules, runtime tooling, and operator runbooks keep
# resolving the workflow by name. Only the trigger surface changed.
on:
  workflow_call:
    inputs:
      conclusion:
        description: CI run conclusion (success/failure/cancelled/timed_out/...).
        required: true
        type: string
      head_branch:
        description: Branch the upstream CI run executed on.
        required: true
        type: string
      head_sha:
        description: Full 40-char SHA the upstream CI run executed on.
        required: true
        type: string
      run_id:
        description: GitHub Actions run id of the upstream CI run.
        required: true
        type: string
      html_url:
        description: HTML URL of the upstream CI run.
        required: true
        type: string
    secrets:
      TELEGRAM_BOT_TOKEN:
        description: Telegram bot token used to post CI notifications.
        required: true
      TELEGRAM_CHAT_ID:
        description: Telegram chat id that receives CI notifications.
        required: true

permissions:
  contents: read
  actions: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Defence-in-depth: the dispatcher already gates this child, but keep
    # the local guard so an ad-hoc workflow_call invocation can't fire a
    # success-state Telegram message.
    if: >-
      inputs.conclusion != 'success' &&
      inputs.conclusion != 'skipped'
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Send Telegram notification with action buttons
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ inputs.conclusion }}
          BRANCH: ${{ inputs.head_branch }}
          SHA: ${{ inputs.head_sha }}
          HTML_URL: ${{ inputs.html_url }}
          RUN_ID: ${{ inputs.run_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram not configured; skipping."
            exit 0
          fi

          SHORT_SHA="${SHA:0:7}"
          # Pick an icon that hints at the conclusion so the operator can
          # tell at a glance whether CI broke, got cancelled, or timed out.
          case "${STATUS}" in
            failure)          ICON="❌" ;;
            cancelled)        ICON="🚫" ;;
            timed_out)        ICON="⏱️" ;;
            action_required)  ICON="⚠️" ;;
            *)                ICON="❓" ;;
          esac
          TITLE="${ICON} CI ${STATUS} on ${BRANCH}"

          TEXT="${TITLE}
          Conclusion: ${STATUS}
          Commit: ${SHORT_SHA}
          ${HTML_URL}"

          # Send with inline keyboard for quick actions
          KEYBOARD='{"inline_keyboard":[[{"text":"🔄 View Run","url":"'"${HTML_URL}"'"},{"text":"📋 Rerun","url":"https://github.com/'"${REPO}"'/actions/runs/'"${RUN_ID}"'/rerun"}]]}'

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"${TEXT}\",\"reply_markup\":${KEYBOARD}}" \
            || echo "Telegram notification failed"
