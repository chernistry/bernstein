name: Observability daily snapshot

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

concurrency:
  group: docs-observability-snapshot
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  snapshot:
    name: Capture daily snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      security-events: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up uv
        uses: ./.github/actions/bootstrap
        with:
          python-version: '3.13'

      - name: Install bernstein
        run: |
          uv sync --group dev

      - name: Capture observe snapshot
        id: capture
        continue-on-error: true  # `doctor observe` returns 1 on Sonar WARN; snapshot still valid.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          BERNSTEIN_GLITCHTIP_TOKEN: ${{ secrets.BERNSTEIN_GLITCHTIP_TOKEN }}
          BERNSTEIN_GLITCHTIP_BASE_URL: ${{ vars.BERNSTEIN_GLITCHTIP_BASE_URL }}
          BERNSTEIN_GLITCHTIP_ORG: ${{ vars.BERNSTEIN_GLITCHTIP_ORG }}
          DTRACK_URL: ${{ vars.DTRACK_URL }}
          DTRACK_TOKEN: ${{ secrets.DTRACK_TOKEN }}
          DTRACK_PROJECT: ${{ vars.DTRACK_PROJECT }}
        run: |
          set -euo pipefail
          mkdir -p docs/observability/snapshots
          DATE=$(date -u +%Y-%m-%d)
          uv run bernstein doctor observe --json --no-persist \
            > "docs/observability/snapshots/${DATE}.json"
          echo "snapshot=docs/observability/snapshots/${DATE}.json" >> "$GITHUB_OUTPUT"

      - name: Render 30-day trends
        run: |
          uv run python scripts/observability/render_trends.py \
            --snapshots-dir docs/observability/snapshots \
            --out docs/observability/trends.md \
            --days 30

      - name: Open PR with snapshot + trends
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/observability-snapshot
          delete-branch: true
          add-paths: |
            docs/observability/snapshots/
            docs/observability/trends.md
          commit-message: |
            chore(observability): daily snapshot + trends refresh
          title: 'chore(observability): daily snapshot + trends refresh'
          body: |
            Automated daily observability snapshot generated by
            `docs-observability-snapshot.yml`. Includes today's JSON
            snapshot under `docs/observability/snapshots/` and a
            re-rendered `docs/observability/trends.md` covering the
            last 30 days.
          labels: |
            chore
            observability
