name: SonarQube scan

# Runs after the main CI workflow completes successfully on main.
# Reuses the coverage.xml artifact uploaded by ci.yml so we do not
# re-run the unit suite. The unit suite takes ~25 minutes when sharded
# per-file in CI; re-running it inline here was hitting the 30 minute
# step timeout (the suite barely reached 5% of files within 30 minutes
# when run as a single pytest --cov invocation).
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: sonar-scan-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    name: SonarQube scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run when:
    # - Triggered manually, or
    # - The upstream CI run succeeded on main and SONAR_HOST_URL is set.
    if: >-
      ${{ vars.SONAR_HOST_URL != '' &&
          (github.event_name == 'workflow_dispatch' ||
           github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Sonar needs full git history for accurate blame. When
          # triggered by workflow_run, check out the SHA that CI ran
          # against so the scan reflects that exact commit.
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Download coverage artifact (workflow_run)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: coverage-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # When triggered manually we have no upstream run-id, so resolve the
      # most recent successful CI run on main and pull its coverage-report
      # artifact. This lets an operator bootstrap or re-scan the project with
      # full Python coverage even when the latest main CI runs were cancelled
      # by ci.yml's cancel-in-progress concurrency (which is the normal state
      # under a rapid merge cadence and is why workflow_run almost never sees
      # a 'success' conclusion to fire on).
      - name: Resolve latest successful CI run (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: ci_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow ci.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -n "$run_id" ]; then
            echo "Found successful CI run: $run_id"
            echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No successful CI run found on main; scanning without coverage"
          fi

      - name: Download coverage artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && steps.ci_run.outputs.run_id != ''
        continue-on-error: true  # coverage is advisory; never block the bootstrap scan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: coverage-report
          run-id: ${{ steps.ci_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify coverage.xml present
        run: |
          if [ ! -f coverage.xml ]; then
            echo "::warning::coverage.xml not found; Sonar scan will run without Python coverage data"
          else
            echo "coverage.xml found ($(wc -c < coverage.xml) bytes)"
          fi

      - name: SonarQube scan
        timeout-minutes: 10
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995  # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=bernstein
            -Dsonar.projectName=Bernstein
            -Dsonar.python.version=3.12,3.13
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.exclusions=src/bernstein/_default_templates/**,src/bernstein/grpc_gen/**
            -Dsonar.scm.revision=${{ github.event.workflow_run.head_sha || github.sha }}
            -Dsonar.ws.timeout=600
