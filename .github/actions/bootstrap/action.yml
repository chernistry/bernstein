name: "Bootstrap CI job"
description: >
  Composite step that runs harden-runner, actions/checkout, and optionally
  astral-sh/setup-uv with a single pinned SHA per dependency. Centralizes the
  triple that every CI job repeats so that pinned-SHA bumps and policy tweaks
  happen in one file.

inputs:
  fetch-depth:
    description: "actions/checkout fetch-depth. Use 0 for full history."
    required: false
    default: "1"
  python-version:
    description: "Python version passed to astral-sh/setup-uv."
    required: false
    default: "3.13"
  enable-uv-cache:
    description: "Toggle astral-sh/setup-uv cache."
    required: false
    default: "true"
  setup-uv:
    description: "Run astral-sh/setup-uv when 'true'. Set 'false' for jobs that do not need uv."
    required: false
    default: "true"
  egress-policy:
    description: "step-security/harden-runner egress-policy. 'audit' or 'block'."
    required: false
    default: "audit"
  persist-credentials:
    description: "Pass-through to actions/checkout persist-credentials."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Harden runner
      uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
      with:
        egress-policy: ${{ inputs.egress-policy }}

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        persist-credentials: ${{ inputs.persist-credentials }}

    - name: Set up uv and Python
      if: ${{ inputs.setup-uv == 'true' }}
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      with:
        enable-cache: ${{ inputs.enable-uv-cache }}
        python-version: ${{ inputs.python-version }}
