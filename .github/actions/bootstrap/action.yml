name: "Bootstrap CI job (post-checkout setup)"
description: >
  Composite step that runs astral-sh/setup-uv with a single pinned SHA.
  Must be invoked AFTER actions/checkout, because a local composite action
  cannot resolve until the repository is on the runner. Each caller inlines
  step-security/harden-runner and actions/checkout itself, then calls this
  composite for Python/uv setup.

inputs:
  python-version:
    description: "Python version passed to astral-sh/setup-uv."
    required: false
    default: "3.13"
  enable-uv-cache:
    description: "Toggle astral-sh/setup-uv cache."
    required: false
    default: "true"
  cache-key-suffix:
    description: "Optional suffix appended to the uv cache key."
    required: false
    default: ""
  setup-uv:
    description: "Run astral-sh/setup-uv when 'true'. Set 'false' for jobs that do not need uv."
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Set up uv and Python
      if: ${{ inputs.setup-uv == 'true' }}
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      with:
        enable-cache: ${{ inputs.enable-uv-cache }}
        python-version: ${{ inputs.python-version }}
        cache-suffix: ${{ inputs.cache-key-suffix }}
