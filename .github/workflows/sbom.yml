name: SBOM

# Generate SPDX + CycloneDX SBOMs for each published release and attach them
# as release assets. Downstream consumers can ingest these into their own
# SCA tooling (Dependency-Track, Grype, etc.).
#
# Ref: #1273

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build the SBOM for"
        required: false
        default: ""

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # Required to attach SBOMs to the release
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          # SBOMs ship as release assets - the cache is shared across the
          # repo, so an attacker who can write to PR caches could poison
          # a release-time build. Disable on this workflow specifically.
          enable-cache: false

      - name: Build wheel + sdist
        run: uv build

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: .
          format: spdx-json
          artifact-name: bernstein.spdx.json
          output-file: bernstein.spdx.json
          upload-artifact: true
          upload-release-assets: ${{ github.event_name == 'release' }}

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: bernstein.cyclonedx.json
          output-file: bernstein.cyclonedx.json
          upload-artifact: true
          upload-release-assets: ${{ github.event_name == 'release' }}

      - name: Upload SBOMs as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: |
            bernstein.spdx.json
            bernstein.cyclonedx.json
          if-no-files-found: error
          retention-days: 30
