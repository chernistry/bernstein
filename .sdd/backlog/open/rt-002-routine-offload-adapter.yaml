## Goal

Create a new Bernstein adapter that spawns tasks as Claude Code Routines via the
`/fire` API endpoint, enabling Bernstein to offload work to Anthropic's cloud
infrastructure. This gives Bernstein a third execution tier beyond local and
Cloudflare: Anthropic-managed cloud sessions that require zero infrastructure.

## Background — Routine /fire API

The Routine API endpoint (research preview, `experimental-cc-routine-2026-04-01`):

```bash
POST https://api.anthropic.com/v1/claude_code/routines/{trigger_id}/fire
Authorization: Bearer sk-ant-oat01-xxxxx
anthropic-beta: experimental-cc-routine-2026-04-01
anthropic-version: 2023-06-01
Content-Type: application/json

{"text": "Dynamic context appended to routine prompt"}
```

Response:
```json
{
  "type": "routine_fire",
  "claude_code_session_id": "session_01HJKLMNOPQRSTUVWXYZ",
  "claude_code_session_url": "https://claude.ai/code/session_01HJKLMNOPQRSTUVWXYZ"
}
```

Key properties:
- The `text` field is appended to the Routine's saved prompt as a one-shot user turn
- Each fire creates a new independent session
- Sessions run on Anthropic cloud (not local, not Cloudflare)
- Sessions can push to `claude/` prefixed branches
- Sessions have access to configured MCP connectors
- Token is per-routine, Bearer auth, revocable
- Beta header required — versions dated, 2 previous versions supported

## Design

### Three-Tier Execution Model

```
┌─────────────────────────────────────────────────┐
│              Bernstein Orchestrator               │
│                                                   │
│  Task Router (epsilon-greedy bandit)              │
│    │                                              │
│    ├── Local adapters    (21 CLI agents)          │
│    │   └── claude, codex, gemini, aider, ...     │
│    │                                              │
│    ├── Cloudflare cloud  (Workers, V8 sandboxes) │
│    │   └── cloudflare_agents, codex_cloudflare   │
│    │                                              │
│    └── Routine cloud [NEW]  (Anthropic infra)    │
│        └── claude_routine adapter                 │
│            fires /fire API, polls session status  │
└─────────────────────────────────────────────────┘
```

### ClaudeRoutineAdapter

New adapter at `src/bernstein/adapters/claude_routine.py`:

```python
class ClaudeRoutineAdapter(BaseAdapter):
    """Spawns tasks as Claude Code Routine sessions via /fire API.

    Unlike the local Claude adapter (subprocess), this adapter:
    - Sends work to Anthropic's cloud via HTTP
    - Doesn't require local Claude Code installation
    - Can run when laptop is closed
    - Has no direct process control (fire-and-forget with polling)
    - Uses subscription-based billing (not API tokens)
    """

    name = "claude_routine"
    requires_local_install = False
    supports_streaming = False  # no real-time output, poll for results

    def __init__(self, config: RoutineAdapterConfig):
        self.api_base = "https://api.anthropic.com/v1/claude_code/routines"
        self.beta_header = "experimental-cc-routine-2026-04-01"
        self.trigger_configs: dict[str, RoutineTriggerInfo] = {}
        # Map roles to pre-configured Routine IDs
        # e.g., "reviewer" -> Routine with review prompt, "qa" -> Routine with test prompt

    async def spawn(self, task: TaskSpec, worktree: Path) -> AgentHandle:
        """Fire a Routine with task context as the `text` payload."""
        trigger = self._select_trigger(task)
        payload = self._build_payload(task, worktree)

        response = await self._fire_routine(trigger.trigger_id, trigger.token, payload)
        session_id = response["claude_code_session_id"]
        session_url = response["claude_code_session_url"]

        return AgentHandle(
            pid=None,  # no local process
            session_id=session_id,
            session_url=session_url,
            poll_interval=30,  # seconds between status checks
        )

    async def poll_status(self, handle: AgentHandle) -> AgentStatus:
        """Poll the session URL for completion. Routines don't have a status API
        yet (research preview), so we check for branch pushes as a proxy."""
        ...

    async def collect_results(self, handle: AgentHandle) -> TaskResult:
        """After session completes, fetch the branch diff as task output."""
        ...

    def _build_payload(self, task: TaskSpec, worktree: Path) -> dict:
        """Build the text payload for /fire. Includes:
        - Task goal and role
        - Repository context (branch, changed files)
        - Quality gate expectations
        - Output format instructions (push branch, leave summary comment)
        """
        return {
            "text": f"""## Bernstein Task Assignment

**Goal**: {task.goal}
**Role**: {task.role}
**Priority**: {task.priority}
**Scope**: {task.scope}

### Instructions
1. Work on branch `claude/bernstein-{task.id}`
2. Focus ONLY on the task goal above
3. Run tests before pushing: `{task.test_command or 'npm test'}`
4. Push the branch when done
5. Leave a commit message starting with `bernstein({task.role}): `

### Context
Repository: {task.repo}
Base branch: {task.base_branch}
Related files: {', '.join(task.context_files[:10])}
"""
        }
```

### RoutineAdapterConfig

```python
@dataclass
class RoutineAdapterConfig:
    """Configuration for the Routine adapter."""
    enabled: bool = False
    api_key: str = ""  # Anthropic API key (for potential future status API)

    # Pre-configured Routines mapped by role
    # Users create Routines on claude.ai/code/routines, then paste trigger IDs here
    routine_triggers: dict[str, RoutineTriggerInfo] = field(default_factory=dict)

    # Fallback: single routine for all tasks
    default_trigger_id: str = ""
    default_trigger_token: str = ""

    # Execution control
    poll_interval_seconds: int = 30
    max_wait_minutes: int = 60
    branch_prefix: str = "claude/bernstein-"

    # Cost control
    max_daily_fires: int = 20  # prevent runaway billing
    prefer_local_below_complexity: str = "moderate"  # use local for simple tasks
```

### Routing Integration

Update the contextual bandit router to consider Routine cloud as a third execution tier:

```python
# src/bernstein/core/routing/routine_router.py

class RoutineRoutingPolicy:
    """Decides when to route to Routine cloud vs local vs Cloudflare."""

    def should_use_routine(self, task: TaskSpec) -> bool:
        """Route to Routine when:
        1. Task is independent (no blocking dependencies requiring local coordination)
        2. Task doesn't need real-time streaming output
        3. Task benefits from cloud execution (user is away, CI context)
        4. Local Claude Code is rate-limited or unavailable
        5. Task role matches a pre-configured Routine
        """
        ...

    def select_tier(self, task: TaskSpec) -> ExecutionTier:
        """Three-tier selection:
        - LOCAL: low latency, full control, real-time output
        - CLOUDFLARE: scalable, edge execution, V8 sandboxes
        - ROUTINE: zero infrastructure, Anthropic-managed, fire-and-forget
        """
        ...
```

