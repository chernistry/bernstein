<?xml version="1.0" encoding="UTF-8"?>
<!--
  Bernstein PR comment mockup (closes #1112)
  Hand-drawn quality stand-in for the structured GitHub PR comment.
  The point is to show the section shape (Summary, Cost, Lineage, Tests,
  Audit-chain), not a pixel-accurate render. Replace with a real screenshot
  whenever a recorded run produces one.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1080" width="960" height="1080" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'JetBrains Mono', monospace">
  <style>
    .bg { fill: #0d1117; }
    .card { fill: #161b22; stroke: #30363d; stroke-width: 1; }
    .header { fill: #1f6feb; }
    .text-primary { fill: #f0f6fc; font-size: 14px; }
    .text-secondary { fill: #8b949e; font-size: 13px; }
    .text-mono { font-family: 'JetBrains Mono', 'SF Mono', monospace; font-size: 12px; fill: #c9d1d9; }
    .text-bold { fill: #f0f6fc; font-size: 14px; font-weight: 600; }
    .text-section { fill: #f0f6fc; font-size: 16px; font-weight: 600; }
    .text-bot { fill: #8b949e; font-size: 12px; }
    .badge-ok { fill: #238636; }
    .badge-warn { fill: #9e6a03; }
    .badge-text { fill: #f0f6fc; font-size: 11px; font-weight: 600; }
    .divider { stroke: #21262d; stroke-width: 1; }
    .accent { fill: #58a6ff; }
    .green { fill: #3fb950; }
    .yellow { fill: #d29922; }
    .red { fill: #f85149; }
    .mono-dim { font-family: 'JetBrains Mono', 'SF Mono', monospace; font-size: 12px; fill: #6e7681; }
    .link { fill: #58a6ff; text-decoration: underline; }
  </style>

  <rect class="bg" width="960" height="1080"/>

