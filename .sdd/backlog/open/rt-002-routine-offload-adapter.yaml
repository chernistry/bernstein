### Setup CLI

```bash
# Interactive setup — walks user through Routine creation
bernstein routine setup
# 1. Opens claude.ai/code/routines in browser
# 2. User creates Routine with provided template
# 3. User pastes trigger_id and token
# 4. Bernstein saves to bernstein.yaml

# Quick add
bernstein routine add --role reviewer --trigger-id trig_01ABC --token sk-ant-oat01-xxx

# List configured routines
bernstein routine list

# Test fire
bernstein routine test --role reviewer --goal "Review PR #42"
```

### Cost Tracking

```python
# src/bernstein/core/cost/routine_cost.py

class RoutineCostTracker:
    """Track Routine usage against subscription limits.

    Routines use subscription credits (not API tokens), so cost is
    estimated based on session duration and model used, not token count.
    """
    daily_fires: int = 0
    max_daily_fires: int = 20

    def estimate_cost(self, session_duration_minutes: int, model: str) -> float:
        """Rough cost estimate based on typical subscription burn rate."""
        ...

    def check_budget(self) -> bool:
        """Return False if daily fire limit reached."""
        return self.daily_fires < self.max_daily_fires
```

### Comparison: When to Use What

| Factor | Local Claude | Cloudflare | Routine |
|--------|-------------|------------|---------|
| Latency | Low (subprocess) | Medium (edge) | High (cloud, async) |
| Control | Full (process, stdin) | Medium (API) | Low (fire-and-forget) |
| Streaming | Yes | Yes | No |
| Infrastructure | Local install | CF account | None (Anthropic managed) |
| Cost model | API tokens | API tokens | Subscription credits |
| Multi-repo | No | No | Yes (Routine can clone multiple) |
| Best for | Interactive, complex | Scale, isolation | Unattended, CI, simple tasks |

