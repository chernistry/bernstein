name: License Compliance

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "requirements*.txt"
  pull_request:
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "requirements*.txt"

concurrency:
  group: license-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  license-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Bootstrap
        uses: ./.github/actions/bootstrap
        with:
          python-version: "3.12"

      - name: Export dependencies
        # `uv pip install -e .` uses the SHA-pinned uv binary above, so
        # there is no unpinned `pip install` step left
        # (Scorecard pinned-dependencies). Install into a uv-managed venv
        # since the runner's system Python is externally-managed (PEP 668).
        run: |
          uv venv --python 3.12 .venv-license
          uv pip install --python .venv-license/bin/python -e .
          uv pip freeze --python .venv-license/bin/python > requirements-all.txt

      - name: Check licenses
        id: license_check_report
        uses: pilosus/action-pip-license-checker@e909b0226ff49d3235c99c4585bc617f49fff16a # v3
        with:
          requirements: "requirements-all.txt"
          report-format: "json-pretty"
          fail: "StrongCopyleft,NetworkCopyleft,Other,Error"

      - name: Save report
        if: always()
        env:
          REPORT: ${{ steps.license_check_report.outputs.report }}
        run: printf '%s' "$REPORT" > license-report.json

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: license-report
          path: license-report.json
