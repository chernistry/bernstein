name: GlitchTip event ingester

# Pulls open unresolved GlitchTip issues into regression eval cases.
# The scraper writes one JSON record per issue under
# .sdd/reports/glitchtip_events/, then `bernstein eval sync-incidents`
# promotes each record to a P1 (warn-only) eval-case YAML under
# src/bernstein/eval/cases/incidents/. The job opens a PR with the
# emitted YAMLs for an operator to review; it never pushes to main.
#
# No host is hardcoded here: the base URL comes from
# vars.BERNSTEIN_GLITCHTIP_BASE_URL so the operator's private
# observability hostname never appears in this file. With the token or
# base URL unset the scraper exits 0 and the job is a no-op.
#
# The cron trigger ships disabled-by-default. Flip ENABLE_CRON to "1"
# (in this file, not at run time) only after a clean workflow_dispatch
# smoke run. This bounds the first-day blast radius to a manual
# invocation while the wiring-probe allow-list settles.

on:
  schedule:
    - cron: '23 6 * * *'  # 06:23 UTC daily; 6 min after the Sonar sweeper.
  workflow_dispatch:
    inputs:
      severity_min:
        description: Minimum severity to include (synthesized cases are P1)
        required: false
        default: P1
        type: choice
        options:
          - P0
          - P1
          - P2
      max_per_day:
        description: Cap on records emitted in this run
        required: false
        default: '10'
      dry_run:
        description: When true, only print the would-be records
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

concurrency:
  group: glitchtip-ingester
  cancel-in-progress: false

env:
  # Phase-1 default knob. The cron trigger is gated by ENABLE_CRON so a
  # scheduled run is a no-op until the operator opts in via a follow-up
  # PR that flips this value. Job 'if:' cannot read env directly, so the
  # gate runs as the first step of the job (see "Gate cron trigger").
  ENABLE_CRON: '0'

jobs:
  ingest:
    name: Ingest GlitchTip events
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      ${{ vars.BERNSTEIN_GLITCHTIP_BASE_URL != '' &&
          (github.event_name == 'workflow_dispatch' ||
           github.event_name == 'schedule') }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Gate cron trigger
        id: gate
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${ENABLE_CRON}" != "1" ]; then
            echo "Cron trigger fired but ENABLE_CRON is '0'; exiting cleanly."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Harden runner
        if: steps.gate.outputs.skip != 'true'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        if: steps.gate.outputs.skip != 'true'
        uses: ./.github/actions/bootstrap
        with:
          python-version: '3.13'

      - name: Install project deps
        if: steps.gate.outputs.skip != 'true'
        run: |
          uv sync --group dev

      - name: Scrape GlitchTip events
        if: steps.gate.outputs.skip != 'true'
        id: scrape
        env:
          # Token is a secret; base URL and org are non-secret vars so
          # the operator's private hostname never lands in this file.
          GLITCHTIP_API_TOKEN: ${{ secrets.GLITCHTIP_API_TOKEN }}
          BERNSTEIN_GLITCHTIP_BASE_URL: ${{ vars.BERNSTEIN_GLITCHTIP_BASE_URL }}
          BERNSTEIN_GLITCHTIP_ORG: ${{ vars.BERNSTEIN_GLITCHTIP_ORG }}
          DRY_RUN_INPUT: ${{ inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          mkdir -p .sdd/reports/glitchtip_events
          args=(
            "--out" ".sdd/reports/glitchtip_events"
            "--cases-dir" "src/bernstein/eval/cases/incidents"
          )
          if [ "${DRY_RUN_INPUT}" = "true" ]; then
            args+=("--dry-run")
          fi
          uv run python scripts/scrape_glitchtip_events.py "${args[@]}"

      - name: Synthesize eval cases
        if: >-
          steps.gate.outputs.skip != 'true' &&
          inputs.dry_run != 'true'
        run: |
          set -euo pipefail
          uv run bernstein eval sync-incidents --workdir .

      - name: Detect new eval-case files
        if: >-
          steps.gate.outputs.skip != 'true' &&
          inputs.dry_run != 'true'
        id: detect
        run: |
          set -euo pipefail
          # Only files under the incidents corpus count toward the PR so
          # the scope stays tight. The scraper's JSON records under
          # .sdd/ are runtime state and are not committed.
          changed=$(git status --porcelain -- src/bernstein/eval/cases/incidents/ | wc -l | tr -d ' ')
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"
          if [ "${changed}" = "0" ]; then
            echo "No new eval cases emitted; will skip PR creation."
          else
            echo "${changed} new eval-case file(s) to commit."
          fi

      - name: Open PR with new eval cases
        if: >-
          steps.gate.outputs.skip != 'true' &&
          steps.detect.outputs.changed != '0' &&
          inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: glitchtip-ingest/${{ github.run_id }}
          delete-branch: true
          add-paths: |
            src/bernstein/eval/cases/incidents/
          commit-message: |
            chore(eval): import glitchtip regression cases
          title: 'chore(eval): import glitchtip regression cases'
          body: |
            Automated import of open unresolved GlitchTip issues as
            regression eval cases under
            `src/bernstein/eval/cases/incidents/`. Generated by
            `.github/workflows/glitchtip-ingester.yml`.

            Each emitted case carries `source_incident:
            glitchtip-issue:<issue_id>` and `severity: P1` (warn-only).
            Re-runs are idempotent: the same issue will not produce a
            second case.

            Administrative wiring-probe issues are filtered out by the
            allow-list in `scripts/scrape_glitchtip_events.py`. If a new
            probe title appears, add it to
            `DEFAULT_WIRING_PROBE_ALLOW_LIST` before merging.

            See `docs/operations/glitchtip-ingester.md` for the env-var
            matrix, the dedup contract, and the severity-mapping note.
          labels: |
            eval
            regression
            chore
