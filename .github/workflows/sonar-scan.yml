name: SonarQube scan

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/sonar-scan.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sonar-scan-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    name: SonarQube scan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ vars.SONAR_HOST_URL != '' }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0  # Sonar needs full git history for accurate blame
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Sync dev deps
        timeout-minutes: 15
        run: uv sync --group dev

      - name: Run coverage
        timeout-minutes: 30
        run: |
          uv run pytest --cov=src/bernstein --cov-report=xml --cov-branch tests/unit/ -q || true

      - name: SonarQube scan
        timeout-minutes: 10
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995  # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=bernstein
            -Dsonar.projectName=Bernstein
            -Dsonar.python.version=3.12,3.13
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.exclusions=src/bernstein/_default_templates/**,src/bernstein/grpc_gen/**
