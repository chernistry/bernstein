name: "Bootstrap CI job (post-checkout setup)"
description: >
  Composite step that runs astral-sh/setup-uv with pinned action and uv versions.
  Must be invoked AFTER actions/checkout, because a local composite action
  cannot resolve until the repository is on the runner. Each caller inlines
  step-security/harden-runner and actions/checkout itself, then calls this
  composite for Python/uv setup.

inputs:
  python-version:
    description: >
      Python version passed to astral-sh/setup-uv. Leave empty to let uv
      resolve the interpreter from the environment (matches the
      pre-composite behaviour where setup-uv was called without
      python-version).
    required: false
    default: ""
  enable-uv-cache:
    description: "Toggle astral-sh/setup-uv cache."
    required: false
    default: "true"
  cache-key-suffix:
    description: "Optional suffix appended to the uv cache key."
    required: false
    default: ""
  setup-uv:
    description: "Run astral-sh/setup-uv when 'true'. Set 'false' for jobs that do not need uv."
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Set up uv (with explicit python-version)
      if: ${{ inputs.setup-uv == 'true' && inputs.python-version != '' }}
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "0.11.16"
        enable-cache: ${{ inputs.enable-uv-cache }}
        python-version: ${{ inputs.python-version }}
        cache-suffix: ${{ inputs.cache-key-suffix }}
    - name: Set up uv (no python-version pin)
      if: ${{ inputs.setup-uv == 'true' && inputs.python-version == '' }}
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "0.11.16"
        enable-cache: ${{ inputs.enable-uv-cache }}
        cache-suffix: ${{ inputs.cache-key-suffix }}
