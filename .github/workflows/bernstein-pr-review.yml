name: "Bernstein PR Review"

# Trigger: automatically review every non-draft pull request.
# Add the label "skip-bernstein" to a PR to opt out.
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'templates/**'

concurrency:
  group: bernstein-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review with Bernstein
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'skip-bernstein')
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Check API key
        id: check
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Bernstein review - no ANTHROPIC_API_KEY secret"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: steps.check.outputs.skip != 'true'
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Fetch PR diff
        if: steps.check.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_DIFF_URL: ${{ github.event.pull_request.diff_url }}
        run: |
          curl --fail --location --silent --show-error --retry 3 \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "${PR_DIFF_URL}" \
            -o .bernstein-pr.diff

      - name: Review PR
        if: steps.check.outputs.skip != 'true'
        continue-on-error: true
        uses: ./
        with:
          task: >
            Review pull request #${{ github.event.pull_request.number }}
            titled "${{ github.event.pull_request.title }}".
            Use .bernstein-pr.diff as the PR diff data. Check code quality,
            run the test suite, verify type correctness, and
            identify any security or correctness issues. Summarise your findings
            and post them as a PR comment. Do not push any changes.
          budget: "3.00"
          post-comment: "true"
