name: "Bernstein CI Fix"

# When CI fails on main, Bernstein runs in headless mode against the failing
# commit, attempts a fix, and either:
#   - opens an `auto-heal/<sha>` PR with the proposed diff, or
#   - falls back to creating a `ci-fix` issue documenting what was tried.
#
# Invocation: this workflow is now invoked by `post-ci-dispatcher.yml`
# via workflow_call. The dispatcher reserves bernstein-ci-fix as the
# fallback fixer: it only runs when auto-heal v2 did not open a heal PR.
# That ordering removes the parallel race the two heals previously ran
# into on the same failing SHA.
#
# Guards (re-enforced locally for defence in depth):
#   - Only fires on the canonical repo (head_repository.full_name == github.repository).
#   - Recursion guard: skips when the failing run was itself an `auto-heal:` PR.
#   - Feature flag `BERNSTEIN_CI_FIX_ENABLED` (repo variable) gates the whole
#     workflow so it stays off until explicitly enabled per environment.
#   - No `actions: write` permission - auto-heal cannot trigger more
#     workflows recursively.
on:
  workflow_call:
    inputs:
      head_sha:
        description: Full 40-char SHA the upstream CI run executed on.
        required: true
        type: string
      head_branch:
        description: Branch the upstream CI run executed on.
        required: true
        type: string
      run_id:
        description: GitHub Actions run id of the upstream CI run.
        required: true
        type: string
      display_title:
        description: Display title of the upstream CI run (commit subject).
        required: true
        type: string
      actor_login:
        description: Login of the actor that triggered the upstream CI run.
        required: true
        type: string
    secrets:
      GEMINI_API_KEY:
        description: >-
          Gemini API key used by the bernstein-ci-fix triage agent.
          Optional - jobs that need it gate on a non-empty value at
          step level.
        required: false
      OPENROUTER_API_KEY_FREE:
        description: >-
          OpenRouter free-tier API key used by the Tier-3 shadow-mode
          escalation (issue #1711). Optional - the Tier-3 job gates
          on the BERNSTEIN_CI_SELF_DRIVE feature flag, so this secret
          is only consulted when the flag is set to "tier3".
        required: false
      GLITCHTIP_DSN:
        description: >-
          Sentry-protocol DSN for the operator error sink. Optional -
          when unset the heal step runs without routing orchestration
          crashes, so forks stay green.
        required: false

# Workflow-level permissions are minimal; each job below declares
# the narrower scopes it actually needs (zizmor excessive-permissions).
permissions: {}

jobs:
  triage:
    name: Triage CI failure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # gh run view (actions API) + gh pr list (pull-requests API).
      actions: read
      pull-requests: read
      contents: read
    # Gate: only run when the autofix variable is enabled and the upstream
    # run was not an auto-heal commit (recursion guard). Conclusion / branch
    # / canonical-repo gating already happened in the dispatcher.
    if: >-
      vars.BERNSTEIN_CI_FIX_ENABLED == 'true' &&
      !startsWith(inputs.display_title, 'auto-heal:') &&
      inputs.actor_login != 'bernstein[bot]' &&
      inputs.actor_login != 'bernstein-orchestrator[bot]' &&
      inputs.actor_login != 'github-actions[bot]'
    outputs:
      head_sha: ${{ steps.meta.outputs.head_sha }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      run_id: ${{ steps.meta.outputs.run_id }}
      branch: ${{ steps.meta.outputs.branch }}
      auto_heal_branch: ${{ steps.meta.outputs.auto_heal_branch }}
      existing_pr: ${{ steps.idempotency.outputs.existing_pr }}
      safe_for_gemini: ${{ steps.scope.outputs.safe_for_gemini }}
      failed_jobs: ${{ steps.scope.outputs.failed_jobs }}
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Extract failure metadata
        id: meta
        env:
          HEAD_SHA: ${{ inputs.head_sha }}
          BRANCH: ${{ inputs.head_branch }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:12}"
          {
            echo "head_sha=${HEAD_SHA}"
            echo "short_sha=${SHORT_SHA}"
            echo "run_id=${RUN_ID}"
            echo "branch=${BRANCH}"
            echo "auto_heal_branch=auto-heal/${SHORT_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Check idempotency (existing auto-heal PR for this SHA)
        id: idempotency
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: auto-heal/${{ steps.meta.outputs.short_sha }}
        run: |
          # If a PR already exists for this SHA's auto-heal branch, do not
          # open another. Idempotent re-runs land here.
          EXISTING=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "$BRANCH_NAME" \
            --state open \
            --json number \
            --jq '.[0].number // ""' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "existing_pr=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "::notice::Auto-heal PR #$EXISTING already exists for $BRANCH_NAME - skipping."
          else
            echo "existing_pr=" >> "$GITHUB_OUTPUT"
          fi

      - name: Classify failure scope (Gemini-safe allowlist)
        id: scope
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ steps.meta.outputs.run_id }}
        run: |
          # Gemini Flash is too narrow for complex fixes (test logic, type
          # errors, security findings, deps). Only let it touch failures
          # where the fix shape is ~1-line deterministic and the cost of a
          # wrong fix is low. Anything else falls back to a ci-fix issue
          # for human triage.
          #
          # Allowlist (exact job names from CI workflow):
          #   - Lint                           (ruff format/check, import-linter)
          #   - Spelling (typos)               (typos crate, autocorrects)
          #   - Workflow lint                  (actionlint via reviewdog)
          #   - Repo hygiene                   (.sdd not tracked, no merge markers, etc.)
          #   - Dead code (Vulture)            (unused vars/imports)
          #   - Test (...)                     (contract-drift fixtures only,
          #                                     guarded by a strict max-LOC cap
          #                                     downstream - see #1273.)
          #
          # `Test (...)` matrix legs were added so trivial contract drift
          # (e.g. "expected gui in DOCUMENTED_COMMANDS",
          # "_INFRASTRUCTURE_PATHS missing /ui", "idle param not forwarded")
          # can be auto-PR'd instead of escalated to a manual issue. The
          # downstream max-LOC guard (see "Enforce small-diff cap" step in
          # job `fix`) refuses to open a PR if the Gemini diff exceeds 50
          # lines added+removed, which keeps the model away from anything
          # that isn't a one-shot fixture edit.
          ALLOWED='^(Lint|Spelling \(typos\)|Workflow lint|Repo hygiene|Dead code \(Vulture\)|Test \()'

          FAILED=$(gh run view "$RUN_ID" \
            --repo "${{ github.repository }}" \
            --json jobs \
            --jq '.jobs[] | select(.conclusion == "failure") | .name' 2>/dev/null || echo "")

          if [ -z "$FAILED" ]; then
            echo "safe_for_gemini=false" >> "$GITHUB_OUTPUT"
            echo "failed_jobs=" >> "$GITHUB_OUTPUT"
            echo "::notice::No failed jobs detected via gh run view - falling back to issue."
            exit 0
          fi

          # Multi-line output via heredoc - preserve newlines for downstream readers.
          {
            echo "failed_jobs<<EOF"
            echo "$FAILED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          UNSAFE=0
          while IFS= read -r job; do
            [ -z "$job" ] && continue
            if echo "$job" | grep -qE "$ALLOWED"; then
              echo "::notice::'$job' - allowlisted for Gemini auto-heal."
            else
              echo "::notice::'$job' - not in allowlist, escalating to human triage."
              UNSAFE=1
            fi
          done <<< "$FAILED"

          if [ "$UNSAFE" = "1" ]; then
            echo "safe_for_gemini=false" >> "$GITHUB_OUTPUT"
          else
            echo "safe_for_gemini=true" >> "$GITHUB_OUTPUT"
          fi

  fix:
    name: Auto-heal with Bernstein
    needs: triage
    if: needs.triage.outputs.existing_pr == '' && needs.triage.outputs.safe_for_gemini == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      pr_url: ${{ steps.open-pr.outputs.pr_url }}
      pr_number: ${{ steps.open-pr.outputs.pr_number }}
      # Surface whichever sub-step actually set a result. open-pr only fires
      # when the diff is small and non-empty; otherwise no-changes-result
      # or oversized-result wins.
      result: ${{ steps.open-pr.outputs.result || steps.oversized-result.outputs.result || steps.no-changes-result.outputs.result }}
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      # persist-credentials kept: this job pushes back to git (auto-heal branch).
      - name: Checkout failing commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6  # zizmor: ignore[artipacked]
        with:
          ref: ${{ needs.triage.outputs.head_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "bernstein[bot]"
          git config user.email "bernstein-bot@users.noreply.github.com"

      - name: Create auto-heal branch
        env:
          AUTO_HEAL_BRANCH: ${{ needs.triage.outputs.auto_heal_branch }}
        run: |
          git checkout -b "$AUTO_HEAL_BRANCH"

      - name: Download failed CI logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ needs.triage.outputs.run_id }}
          HEAD_SHA: ${{ needs.triage.outputs.head_sha }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p /tmp/ci-failure
          gh run view "$RUN_ID" --log-failed > /tmp/ci-failure/logs.txt 2>&1 || true
          # Truncate to last 200 lines so the model gets the relevant tail.
          tail -n 200 /tmp/ci-failure/logs.txt > /tmp/ci-failure/logs-tail.txt
          {
            echo "# CI failure on commit ${HEAD_SHA}"
            echo
            echo "Run: ${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
            echo
            echo "## Failing job tail (last 200 lines)"
            echo
            echo '```'
            cat /tmp/ci-failure/logs-tail.txt
            echo '```'
          } > /tmp/ci-failure/summary.md

      - name: Run Bernstein auto-heal
        id: bernstein
        uses: ./
        continue-on-error: true
        with:
          task: fix-ci
          budget: "5.00"
          cli: gemini
          max-retries: "3"
          post-comment: "false"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Opt out of the action's default commit-and-push: this workflow
          # stages the diff into a dedicated `auto-heal/<sha>` branch and
          # opens a PR (see "Push auto-heal branch and open PR" below).
          BERNSTEIN_SKIP_AUTO_COMMIT: "true"
          # Route unexpected orchestration crashes (agent abort, dead-letter,
          # autofix daemon faults) to the operator error sink. No-op when the
          # secret is unset, so forks stay green.
          BERNSTEIN_TELEMETRY_DSN: ${{ secrets.GLITCHTIP_DSN }}

      - name: Detect changes
        id: diff
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce small-diff cap (max 50 LOC)
        id: size-check
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          # Auto-heal is only safe for trivial deterministic fixes. We cap
          # the diff at 50 LOC added+removed (excluding the diff header) so
          # the Test allowlist entry can't turn into an open invitation for
          # the model to rewrite production code. Anything larger drops to
          # the fallback-issue path for human triage. See #1273.
          MAX_LOC=50
          # Sum the added + removed columns. Binary files report '-' for
          # both columns; treat those as oversized to force human review.
          if git diff HEAD --numstat | awk '{ if ($1 == "-" || $2 == "-") { exit 2 } added+=$1; removed+=$2 } END { exit (added+removed > '"$MAX_LOC"') ? 1 : 0 }'; then
            TOTAL=$(git diff HEAD --numstat | awk '{ added+=$1; removed+=$2 } END { print added+removed }')
            echo "::notice::Auto-heal diff is ${TOTAL} LOC (cap ${MAX_LOC}) - within cap."
            echo "within_cap=true" >> "$GITHUB_OUTPUT"
          else
            STATUS=$?
            if [ "$STATUS" = "2" ]; then
              echo "::warning::Auto-heal diff contains binary changes - refusing to auto-PR."
            else
              TOTAL=$(git diff HEAD --numstat | awk '{ added+=$1; removed+=$2 } END { print added+removed }')
              echo "::warning::Auto-heal diff is ${TOTAL} LOC, exceeds cap ${MAX_LOC} - escalating to fallback issue."
            fi
            echo "within_cap=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push auto-heal branch and open PR
        id: open-pr
        if: steps.diff.outputs.has_changes == 'true' && steps.size-check.outputs.within_cap == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTO_HEAL_BRANCH: ${{ needs.triage.outputs.auto_heal_branch }}
          SHORT_SHA: ${{ needs.triage.outputs.short_sha }}
          HEAD_SHA: ${{ needs.triage.outputs.head_sha }}
          RUN_ID: ${{ needs.triage.outputs.run_id }}
        run: |
          git add -A
          git commit -m "auto-heal: fix CI on ${SHORT_SHA}

          Bernstein attempted to fix the CI failure on ${HEAD_SHA}.
          Source run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${RUN_ID}"
          git push origin "$AUTO_HEAL_BRANCH"

          PR_BODY=$(cat <<EOF
          ## Auto-heal proposal

          Bernstein detected a CI failure on \`${HEAD_SHA}\` and ran in headless
          mode (3 iterations, \$5 budget) to produce this candidate fix.

          - Failing CI run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${RUN_ID}
          - Auto-heal branch: \`${AUTO_HEAL_BRANCH}\`

          A human reviewer must verify the proposed diff before merge - the
          standard required CI checks must still pass on this PR.

          <details>
          <summary>Failing log tail</summary>

          \`\`\`
          $(cat /tmp/ci-failure/logs-tail.txt)
          \`\`\`
          </details>
          EOF
          )

          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "$AUTO_HEAL_BRANCH" \
            --title "auto-heal: fix CI on ${SHORT_SHA}" \
            --body "$PR_BODY" \
            --label "auto-heal,ci-fix")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          PR_NUMBER=$(echo "$PR_URL" | sed -E 's#.*/pull/##')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "result=pr_opened" >> "$GITHUB_OUTPUT"

      - name: Mark no-changes outcome
        id: no-changes-result
        if: steps.diff.outputs.has_changes != 'true'
        run: echo "result=no_changes" >> "$GITHUB_OUTPUT"

      - name: Mark oversized-diff outcome
        id: oversized-result
        if: steps.diff.outputs.has_changes == 'true' && steps.size-check.outputs.within_cap != 'true'
        run: echo "result=oversized_diff" >> "$GITHUB_OUTPUT"

  # Tier-3 OpenRouter free-tier shadow-mode escalation (issue #1711).
  #
  # Fires only when ALL of the following hold:
  #   - vars.BERNSTEIN_CI_SELF_DRIVE == 'tier3'  (env-driven feature flag,
  #     default off so the variable is unset on shared infrastructure).
  #   - The Gemini auto-heal step (job ``fix``) produced no_changes.
  #   - The Gemini-safe allowlist gate (job ``triage``) classified the
  #     failure as safe (otherwise the failure class is out of scope).
  #
  # Shadow mode by default: this job captures the patch + lineage +
  # decision-log row + envelope row, then exits without pushing.
  # Setting vars.BERNSTEIN_CI_SELF_DRIVE_PROMOTE_FROM_SHADOW == '1'
  # would flip the captured patch into an actual push; that toggle is
  # documented as off until the shadow-week metrics review (see
  # docs/operations/autofix-tier3.md).
  #
  # The cordon zones inherit the bernstein-ci-fix.yml allowlist:
  # the Python runner enforces both the failure-class allowlist
  # (Lint / Spelling / Workflow lint / Repo hygiene / Dead code /
  # Test (...)) and the file-path cordon (core.autoheal.cordon plus
  # tests/contract/contracts/*.yaml). Anything outside is a hard refusal
  # logged as a ``cordon_violation`` decision-log row.
  tier3-shadow:
    name: Tier-3 OpenRouter shadow-mode escalation
    needs: [triage, fix]
    if: |
      always() &&
      vars.BERNSTEIN_CI_SELF_DRIVE == 'tier3' &&
      needs.triage.outputs.existing_pr == '' &&
      needs.triage.outputs.safe_for_gemini == 'true' &&
      needs.fix.outputs.result == 'no_changes'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
    env:
      BERNSTEIN_CI_SELF_DRIVE: ${{ vars.BERNSTEIN_CI_SELF_DRIVE }}
      BERNSTEIN_CI_SELF_DRIVE_PROMOTE_FROM_SHADOW: ${{ vars.BERNSTEIN_CI_SELF_DRIVE_PROMOTE_FROM_SHADOW }}
      BERNSTEIN_OPENROUTER_BASE_URL: ${{ vars.BERNSTEIN_OPENROUTER_BASE_URL }}
      BERNSTEIN_CI_AUTOHEAL_HARD_CAP_USD: ${{ vars.BERNSTEIN_CI_AUTOHEAL_HARD_CAP_USD }}
      OPENROUTER_API_KEY_FREE: ${{ secrets.OPENROUTER_API_KEY_FREE }}
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout main (trusted ref)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Verify and pin to failing commit
        env:
          HEAD_SHA: ${{ needs.triage.outputs.head_sha }}
        run: |
          set -euo pipefail
          if ! echo "$HEAD_SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::head_sha '$HEAD_SHA' is not a 40-hex SHA"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$HEAD_SHA" origin/main; then
            echo "::error::head_sha '$HEAD_SHA' is not reachable from origin/main"
            exit 1
          fi
          git -c advice.detachedHead=false checkout "$HEAD_SHA"
      - name: Set up Python via uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
      - name: Capture failing log tail
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ needs.triage.outputs.run_id }}
        run: |
          mkdir -p /tmp/tier3
          gh run view "$RUN_ID" --log-failed > /tmp/tier3/logs.txt 2>&1 || true
          tail -n 200 /tmp/tier3/logs.txt > /tmp/tier3/logs-tail.txt
      - name: Invoke Tier-3 shadow runner
        env:
          FAILED_RUN_ID: ${{ needs.triage.outputs.run_id }}
          HEAD_SHA: ${{ needs.triage.outputs.head_sha }}
          FAILED_JOBS: ${{ needs.triage.outputs.failed_jobs }}
        run: |
          # The runner script wraps src.bernstein.core.autofix.tier3
          # with the OpenRouter provider call + cordon check. Shadow
          # outputs land under .sdd/autoheal/ in the runner workspace;
          # they are uploaded as an artefact below for operator review.
          uv sync --no-progress
          uv run python scripts/run_tier3_shadow.py \
            --failed-run-id "$FAILED_RUN_ID" \
            --head-sha "$HEAD_SHA" \
            --failure-class "$(echo "$FAILED_JOBS" | head -n1)" \
            --log-tail /tmp/tier3/logs-tail.txt \
            --sdd-dir .sdd
      - name: Upload Tier-3 shadow artefacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tier3-shadow-${{ needs.triage.outputs.short_sha }}
          path: |
            .sdd/autoheal/tier3-shadow/
            .sdd/autoheal/ci-autoheal-envelope.jsonl
            .sdd/autoheal/recurrence.jsonl
            .sdd/runtime/decisions.jsonl
          if-no-files-found: ignore
          retention-days: 14

  fallback-issue:
    name: Open ci-fix issue (fallback)
    needs: [triage, fix]
    if: |
      always() &&
      needs.triage.result == 'success' &&
      needs.triage.outputs.head_sha != '' &&
      needs.triage.outputs.run_id != '' &&
      needs.triage.outputs.existing_pr == '' &&
      (needs.triage.outputs.safe_for_gemini != 'true' ||
       needs.fix.result == 'failure' ||
       needs.fix.result == 'skipped' ||
       needs.fix.outputs.result == 'no_changes' ||
       needs.fix.outputs.result == 'oversized_diff')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Create or update ci-fix issue
        # Dedup behaviour (refs #1273, March 30 issue-flood incident):
        #   - At most ONE open `ci-fix` issue at a time.
        #   - On a fresh failure with no open ci-fix issue: open one.
        #   - On a fresh failure when one is already open: append a
        #     comment with the new failing SHA + run-link so the operator
        #     sees successive failures without us spamming the inbox with
        #     one issue per SHA. (The old code silently dropped this
        #     signal: any subsequent failure while an issue was open
        #     produced no new artefact at all.)
        # Issue close-out is owned by `close-ci-issues` in ci.yml, which
        # fires on the next green push to main.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ needs.triage.outputs.head_sha }}
          RUN_ID: ${{ needs.triage.outputs.run_id }}
          OUTCOME: ${{ needs.fix.outputs.result }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          RUN_URL="${{ github.server_url }}/${REPO}/actions/runs/${RUN_ID}"
          TITLE="[ci-fix] CI failing on main"
          REASON="Bernstein auto-heal could not produce a fix in 3 iterations within \$5 budget."
          if [ "$OUTCOME" = "no_changes" ]; then
            REASON="Bernstein auto-heal ran but produced no diff (likely a transient/infrastructural failure or out-of-scope error)."
          elif [ "$OUTCOME" = "oversized_diff" ]; then
            REASON="Bernstein auto-heal produced a diff larger than the 50 LOC safety cap. Refusing to auto-PR; human review required (see #1273 for the cap rationale)."
          fi
          BODY=$(cat <<EOF
          CI failure on commit \`${HEAD_SHA}\`. Run: $RUN_URL

          **Auto-heal outcome:** ${REASON}

          Manual investigation needed. This issue is closed automatically
          by \`close-ci-issues\` in \`ci.yml\` once main is green again.
          EOF
          )
          # Find any open ci-fix issue. We do not key on RUN_ID in the
          # title any more so successive failures collapse into one issue.
          EXISTING=$(gh issue list \
            --repo "${REPO}" \
            --label ci-fix \
            --state open \
            --json number \
            --jq '.[0].number // ""')
          if [ -z "$EXISTING" ]; then
            gh issue create \
              --repo "${REPO}" \
              --title "$TITLE" \
              --body "$BODY" \
              --label "bug,ci-fix" || true
          else
            echo "::notice::Existing ci-fix issue #${EXISTING}; appending new failure context."
            COMMENT=$(cat <<EOF
          Additional CI failure on \`${HEAD_SHA}\`. Run: $RUN_URL

          **Auto-heal outcome:** ${REASON}
          EOF
          )
            gh issue comment "$EXISTING" \
              --repo "${REPO}" \
              --body "$COMMENT" || true
          fi
