name: Review-bot post-merge sweep

# Nightly sweep over recently merged PRs that looks for must-address
# CodeRabbit and Sourcery findings that slipped through. If any are
# found, opens a single consolidated follow-up PR carrying a manifest
# of the missed findings. If none are found, exits cleanly.
#
# This is the safety net behind the pre-merge `review-bot-ack` gate:
# the gate enforces acknowledgement of every must-address finding;
# this sweeper re-checks merged PRs in case a finding was posted after
# the gate ran or was ack'd without a corresponding code change.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      since_days:
        description: "Look back N days (default 30)"
        required: false
        default: "30"

permissions: {}

jobs:
  sweep:
    name: Sweep recently merged PRs for unprocessed bot findings
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Sweep merged PRs and collect missed findings
        id: collect
        env:
          GH_TOKEN: ${{ secrets.LANDING_REPO_PAT || secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          SINCE_DAYS: ${{ github.event.inputs.since_days || '30' }}
        run: |
          python3 scripts/review_bot_sweep.py \
            --owner "$OWNER" \
            --repo "$REPO_NAME" \
            --since-days "$SINCE_DAYS" \
            --out review-sweep-manifest.md
          if [ -s review-sweep-manifest.md ]; then
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open consolidated follow-up PR
        if: steps.collect.outputs.has_findings == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.LANDING_REPO_PAT || secrets.GITHUB_TOKEN }}
          commit-message: "fix(review): apply deferred review-bot findings"
          title: "fix(review): apply deferred review-bot findings"
          body-path: review-sweep-manifest.md
          branch: review-sweep/${{ github.run_id }}
          delete-branch: true
          add-paths: |
            review-sweep-manifest.md
          base: main
